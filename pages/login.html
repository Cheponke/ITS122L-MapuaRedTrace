<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RedTrace — Login / Register</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body {
      background: url('../red-bg.jpg') center center / cover no-repeat fixed;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(80, 0, 0, 0.70);
      z-index: 0;
    }
    nav { position: relative; z-index: 10; }
    .login-container {
      position: relative;
      z-index: 1;
      border-top: 4px solid var(--mapua-gold);
    }
    .login-container h2 { color: var(--mapua-red); }
    .tabs { border-bottom: 2px solid #f0e8e8; padding-bottom: 0.5rem; margin-bottom: 1.25rem; }
    .tab-btn.active { background: var(--mapua-red); }
    .btn[onclick="handleLogin()"],
    .btn[onclick="handleRegister()"] {
      background: var(--mapua-red);
      font-weight: 700;
      letter-spacing: 0.03em;
    }
    .btn[onclick="handleLogin()"]:hover,
    .btn[onclick="handleRegister()"]:hover {
      background: var(--mapua-dark);
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">
      <img src="../mapua-logo.png" alt="Mapua" style="height:32px; vertical-align:middle; margin-right:0.5rem;" />
      <strong>RedTrace</strong>
    </div>
    <div>
      <a href="../index.html">Home</a>
      <a href="policies.html">Help/Policies</a>
      <a href="notifications.html">Notifications</a>
    </div>
  </nav>

  <div class="login-container">
    <div style="text-align:center; margin-bottom:1rem;">
      <img src="../mapua-logo.png" alt="Mapúa" style="height:48px; margin-bottom:0.5rem;" />
      <p style="color:var(--mapua-red); font-size:0.85rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.25rem;">Donate Now</p>
      <h2 style="margin-top:0;">Welcome Back</h2>
      <p style="color:#666; font-size:0.9rem;">Sign in to access your dashboard and track your donations.</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchFormTab('login', this)">Sign In</button>
      <button class="tab-btn" onclick="switchFormTab('register', this)">Register</button>
    </div>

    <!-- SIGN IN -->
    <div id="login-panel">
      <label>Login As</label>
      <div class="role-toggle">
        <button class="role-btn active" id="role-donor" onclick="setRole('donor')">Donor</button>
        <button class="role-btn" id="role-staff" onclick="setRole('staff')">Hospital Staff</button>
      </div>
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="your.email@university.edu" />
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter your password" />
      <div class="error" id="login-error"></div>
      <button class="btn" style="width:100%; margin-top:0.75rem;" onclick="handleLogin()">Sign In</button>
    </div>

    <!-- REGISTER -->
    <div id="register-panel" class="hidden">
      <label>First Name *</label>
      <input type="text" id="reg-firstname" placeholder="Enter your first name" />
      <label>Last Name *</label>
      <input type="text" id="reg-lastname" placeholder="Enter your last name" />
      <label>Email *</label>
      <input type="email" id="reg-email" placeholder="your.email@university.edu" />
      <label>Phone Number *</label>
      <input type="tel" id="reg-phone" placeholder="+63 912 345 6789" />
      <label>Birth Date *</label>
      <input type="date" id="reg-birthdate" />
      <label>Sex *</label>
      <select id="reg-sex">
        <option value="">Select sex</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
      <label>Blood Type</label>
      <select id="reg-bloodtype">
        <option value="">Select blood type (if known)</option>
        <option>A+</option><option>A-</option>
        <option>B+</option><option>B-</option>
        <option>AB+</option><option>AB-</option>
        <option>O+</option><option>O-</option>
      </select>
      <label>Address *</label>
      <input type="text" id="reg-address" placeholder="Enter your address" />
      <label>Password *</label>
      <input type="password" id="reg-password" placeholder="Minimum 8 characters" />
      <label>Confirm Password *</label>
      <input type="password" id="reg-confirm" placeholder="Confirm your password" />
      <div class="error" id="register-error"></div>
      <button class="btn" style="width:100%; margin-top:0.75rem;" onclick="handleRegister()">Create Account</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    let selectedRole = "donor";

    function setRole(role) {
      selectedRole = role;
      document.getElementById("role-donor").classList.toggle("active", role === "donor");
      document.getElementById("role-staff").classList.toggle("active", role === "staff");
    }

    function switchFormTab(tab, btn) {
      document.getElementById("login-panel").classList.toggle("hidden", tab !== "login");
      document.getElementById("register-panel").classList.toggle("hidden", tab !== "register");
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }

    function handleLogin() {
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      if (!email || !password) { showError("login-error", "Please fill in all fields."); return; }
      hideError("login-error");
      Auth.login(email, password, selectedRole);
    }

    function handleRegister() {
      const password = document.getElementById("reg-password").value;
      const confirm  = document.getElementById("reg-confirm").value;
      if (password !== confirm) { showError("register-error", "Passwords do not match."); return; }
      hideError("register-error");
      Auth.register({
        firstName: document.getElementById("reg-firstname").value.trim(),
        lastName:  document.getElementById("reg-lastname").value.trim(),
        email:     document.getElementById("reg-email").value.trim(),
        phone:     document.getElementById("reg-phone").value.trim(),
        birthDate: document.getElementById("reg-birthdate").value,
        sex:       document.getElementById("reg-sex").value,
        bloodType: document.getElementById("reg-bloodtype").value,
        address:   document.getElementById("reg-address").value.trim(),
        password,
      });
    }
  </script>
</body>
</html>
