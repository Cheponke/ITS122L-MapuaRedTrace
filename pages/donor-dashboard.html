<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RedTrace — Donor Dashboard</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <nav>
    <div class="nav-logo">
      <img src="../mapua-logo.png" alt="Mapua" style="height:32px; vertical-align:middle; margin-right:0.5rem;" />
      <strong>RedTrace</strong>
    </div>
    <div>
      <a href="../index.html">Home</a>
      <a href="policies.html">Help/Policies</a>
      <a href="notifications.html">Notifications</a>
      <a href="donation-process.html" class="btn btn-sm">Donate Now</a>
      <button onclick="Auth.logout()" class="btn-signout">Sign Out</button>
    </div>
  </nav>

  <div class="dashboard">

    <div class="user-header">
      <div>
        <h2 id="donor-name" style="margin:0;">Loading...</h2>
        <p id="donor-id" style="margin:0; color:#888; font-size:0.85rem;"></p>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <h3 id="stat-total-donations">—</h3>
        <p style="margin:0; color:#888;">Total Donations</p>
      </div>
      <div class="stat-card">
        <h3 id="donor-blood-type">—</h3>
        <p style="margin:0; color:#888;">Blood Type</p>
      </div>
      <div class="stat-card">
        <h3 id="donor-status">—</h3>
        <p style="margin:0; color:#888;">Donor Status</p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('profile-panel', 'history-panel', this)">My Profile</button>
      <button class="tab-btn" onclick="switchTab('history-panel', 'profile-panel', this)">Donation History</button>
    </div>

    <div id="profile-panel" class="panel">
      <div class="flex-between" style="margin-bottom:1.5rem;">
        <h3 style="margin:0;">Personal Information</h3>
        <button class="btn" onclick="toggleEdit()">Edit Profile</button>
      </div>

      <!-- VIEW MODE -->
      <div id="view-mode">
        <label>First Name</label><div class="field-val" id="view-first-name">—</div>
        <label>Last Name</label><div class="field-val" id="view-last-name">—</div>
        <label>Email</label><div class="field-val" id="view-email">—</div>
        <label>Contact Number</label><div class="field-val" id="view-contact">—</div>
        <label>Address</label><div class="field-val" id="view-address">—</div>
        <label>Birth Date</label><div class="field-val" id="view-birthdate">—</div>
        <label>Sex</label><div class="field-val" id="view-sex">—</div>
        <label>Blood Type</label><div class="field-val" id="view-bloodtype">—</div>
      </div>

      <!-- EDIT MODE -->
      <div id="edit-mode" class="hidden">
        <label>First Name</label><input type="text" id="edit-first-name" />
        <label>Last Name</label><input type="text" id="edit-last-name" />
        <label>Email</label><input type="email" id="edit-email" />
        <label>Contact Number</label><input type="tel" id="edit-contact" />
        <label>Address</label><input type="text" id="edit-address" />
        <label>Birth Date</label><input type="date" id="edit-birthdate" />
        <label>Sex</label>
        <select id="edit-sex">
          <option value="">Select sex</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
        <label>Blood Type</label>
        <select id="edit-bloodtype">
          <option value="">Select blood type</option>
          <option>A+</option><option>A-</option>
          <option>B+</option><option>B-</option>
          <option>AB+</option><option>AB-</option>
          <option>O+</option><option>O-</option>
        </select>
        <div style="display:flex; gap:0.5rem; margin-top:1rem;">
          <button class="btn" onclick="saveProfile()">Save Changes</button>
          <button class="btn btn-outline" onclick="toggleEdit()">Cancel</button>
        </div>
      </div>
    </div>

    <div id="history-panel" class="panel hidden">
      <h3>Donation History</h3>
      <table>
        <thead>
          <tr><th>Date</th><th>Status</th><th>Quantity</th><th>Blood Type</th></tr>
        </thead>
        <tbody id="donation-history-tbody">
          <tr><td colspan="4">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/donor.js"></script>
  <script>
    let currentDonorProfile = null;

    async function init() {
      const session = await Auth.requireAuth();
      if (!session) return;
      const userId = session.user.id;

      currentDonorProfile = await Donor.getProfile(userId);
      if (!currentDonorProfile) {
        document.getElementById("donor-name").textContent = "Profile not found";
        document.getElementById("donor-id").textContent = "Your donor profile could not be loaded.";
        return;
      }

      document.getElementById("donor-name").textContent =
        `${currentDonorProfile.first_name || ""} ${currentDonorProfile.last_name || ""}`.trim();
      document.getElementById("donor-id").textContent = `Donor ID: ${currentDonorProfile.donor_id || "Not assigned"}`;
      document.getElementById("donor-blood-type").textContent = currentDonorProfile.blood_type || "—";
      document.getElementById("donor-status").textContent = currentDonorProfile.status || "Active";

      document.getElementById("view-first-name").textContent = currentDonorProfile.first_name || "—";
      document.getElementById("view-last-name").textContent  = currentDonorProfile.last_name  || "—";
      document.getElementById("view-email").textContent      = currentDonorProfile.email       || "—";
      document.getElementById("view-contact").textContent    = currentDonorProfile.contact_number || "—";
      document.getElementById("view-address").textContent    = currentDonorProfile.address     || "—";
      document.getElementById("view-birthdate").textContent  = formatDate(currentDonorProfile.birth_date);
      document.getElementById("view-sex").textContent        = currentDonorProfile.sex         || "—";
      document.getElementById("view-bloodtype").textContent  = currentDonorProfile.blood_type  || "—";

      document.getElementById("edit-first-name").value  = currentDonorProfile.first_name  || "";
      document.getElementById("edit-last-name").value   = currentDonorProfile.last_name   || "";
      document.getElementById("edit-email").value       = currentDonorProfile.email        || "";
      document.getElementById("edit-contact").value     = currentDonorProfile.contact_number || "";
      document.getElementById("edit-address").value     = currentDonorProfile.address      || "";
      document.getElementById("edit-birthdate").value   = currentDonorProfile.birth_date   || "";
      document.getElementById("edit-sex").value         = currentDonorProfile.sex          || "";
      document.getElementById("edit-bloodtype").value   = currentDonorProfile.blood_type   || "";

      const history = await Donor.getDonationHistory(currentDonorProfile.id);
      Donor.renderDonationHistory(history);
      document.getElementById("stat-total-donations").textContent = history.length;
    }

    function toggleEdit() {
      document.getElementById("view-mode").classList.toggle("hidden");
      document.getElementById("edit-mode").classList.toggle("hidden");
    }

    async function saveProfile() {
      if (!currentDonorProfile) return;
      const updates = {
        first_name:      document.getElementById("edit-first-name").value.trim(),
        last_name:       document.getElementById("edit-last-name").value.trim(),
        contact_number:  document.getElementById("edit-contact").value.trim(),
        address:         document.getElementById("edit-address").value.trim(),
        birth_date:      document.getElementById("edit-birthdate").value || null,
        sex:             document.getElementById("edit-sex").value,
        blood_type:      document.getElementById("edit-bloodtype").value,
      };
      const success = await Donor.updateProfile(currentDonorProfile.id, updates);
      if (success) { alert("Profile updated!"); location.reload(); }
      else alert("Failed to save. Please try again.");
    }

    function switchTab(show, hide, btn) {
      document.getElementById(show).classList.remove("hidden");
      document.getElementById(hide).classList.add("hidden");
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }

    init();
  </script>
</body>
</html>
